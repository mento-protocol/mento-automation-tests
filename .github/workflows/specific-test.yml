name: Specific Test Run

on:
  workflow_dispatch:
    inputs:
      APP_NAME:
        description: "App name"
        type: choice
        required: true
        options:
          - "app-mento"
          - "governance"
      CHAIN_NAME:
        description: "Chain name"
        required: false
        type: choice
        default: "Celo"
        options:
          - "Celo"
          - "Monad"
      CUSTOM_URL:
        description: "Custom environment url"
        type: string
        required: false
      ENV:
        description: "Environment name"
        type: choice
        required: false
        default: "prod"
        options:
          - "prod"
          - "qa"
      SPECS_REGEX:
        description: "Specs regex (e.g., tags, spec or test names)"
        type: string
        required: true
      SPECS_DIR:
        description: "Specs directory"
        type: string
        required: false
        default: ""

      HTML_REPORT_GENERATION:
        description: "Should generate HTML report?"
        type: choice
        required: false
        default: "onFailure"
        options:
          - "true"
          - "false"
          - "onFailure"
      TESTOMAT_REPORT_GENERATION:
        description: "Should generate Testomat report?"
        type: boolean
        required: false
        default: true
      IS_PARALLEL_RUN:
        description: "Should use parallel mode?"
        type: boolean
        required: false
        default: false
      IS_MAINNET:
        description: "Should use mainnet?"
        type: boolean
        required: false
        default: false
      IS_FORK:
        description: "Should use fork mode?"
        type: boolean
        required: false
        default: false
jobs:
  test:
    name: "Specific Test Run"
    uses: ./.github/workflows/re-usable-test.yml
    with:
      ENV: ${{ inputs.ENV }}
      APP_NAME: ${{ inputs.APP_NAME }}
      SPECS_REGEX: ${{ inputs.SPECS_REGEX }}
      SPECS_TYPE: "web"
      SPECS_DIR: ${{ inputs.SPECS_DIR }}
      HTML_REPORT_GENERATION: ${{ inputs.HTML_REPORT_GENERATION }}
      HTML_REPORT_NAME: "specific"
      TESTOMAT_REPORT_GENERATION: ${{ inputs.TESTOMAT_REPORT_GENERATION }}
      TESTOMATIO_TITLE: "[${{ inputs.APP_NAME }}] Specific"
      IS_PARALLEL_RUN: ${{ inputs.IS_PARALLEL_RUN }}
      CUSTOM_URL: ${{ inputs.CUSTOM_URL }}
      IS_MAINNET: ${{ inputs.IS_MAINNET }}
      CHAIN_NAME: ${{ inputs.CHAIN_NAME }}
      IS_FORK: ${{ inputs.IS_FORK }}
      NOTIFICATION_MESSAGE: "[${{ inputs.APP_NAME }}] Specific Test"
    secrets: inherit
