# Regression via sequential and parallel modes
name: "[App-Mento] Regression Test Run"

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:
    inputs:
      CHAIN_NAME:
        description: "Chain Name"
        type: choice
        required: false
        default: "Celo"
        options:
          - "Celo"
          - "Monad"
      CUSTOM_URL:
        description: "Custom Environment URL"
        required: false
        type: string
      HTML_REPORT_GENERATION:
        description: "Generate HTML Report"
        type: choice
        required: false
        default: "onFailure"
        options:
          - "true"
          - "false"
          - "onFailure"
      TESTOMAT_REPORT_GENERATION:
        description: "Generate Testomat Report"
        type: boolean
        required: false
        default: true
      IS_MAINNET:
        description: "Use Mainnet"
        type: boolean
        required: false
        default: true
      IS_FORK:
        description: "Use Fork Mode"
        type: boolean
        required: false
        default: false

jobs:
  app_mento_regression_sequential:
    name: "[App-Mento] Sequential Regression Test Run"
    uses: ./.github/workflows/base-test.yml
    with:
      APP_NAME: "app-mento"
      SPECS_REGEX: "@regression,@sequential"
      EXCLUDE_SPECS_REGEX: "@parallel"
      IS_PARALLEL_RUN: false
      IS_MAINNET: ${{ github.event_name == 'schedule' || inputs.IS_MAINNET }}
      IS_FORK: ${{ github.event_name == 'workflow_dispatch' && inputs.IS_FORK || false }}
      CHAIN_NAME: ${{ inputs.CHAIN_NAME || 'Celo' }}
      HTML_REPORT_GENERATION: ${{ inputs.HTML_REPORT_GENERATION || 'onFailure' }}
      HTML_REPORT_NAME: "app-mento-sequential-regression"
      TESTOMAT_REPORT_GENERATION: ${{ github.event_name == 'schedule' || inputs.TESTOMAT_REPORT_GENERATION }}
      TESTOMATIO_TITLE: "[App-Mento] Sequential-Regression"
      CUSTOM_URL: ${{ inputs.CUSTOM_URL }}
      NOTIFICATION_MESSAGE: "[App-Mento] Sequential-Regression"
    secrets: inherit

  app_mento_regression_parallel:
    name: "[App-Mento] Parallel Regression Test Run"
    uses: ./.github/workflows/base-test.yml
    with:
      APP_NAME: "app-mento"
      SPECS_REGEX: "@regression,@parallel"
      EXCLUDE_SPECS_REGEX: "@sequential"
      IS_PARALLEL_RUN: true
      IS_MAINNET: ${{ github.event_name == 'schedule' || inputs.IS_MAINNET }}
      IS_FORK: ${{ github.event_name == 'workflow_dispatch' && inputs.IS_FORK || false }}
      CHAIN_NAME: ${{ inputs.CHAIN_NAME || 'Celo' }}
      HTML_REPORT_GENERATION: ${{ inputs.HTML_REPORT_GENERATION || 'onFailure' }}
      HTML_REPORT_NAME: "app-mento-parallel-regression"
      TESTOMAT_REPORT_GENERATION: ${{ github.event_name == 'schedule' || inputs.TESTOMAT_REPORT_GENERATION }}
      TESTOMATIO_TITLE: "[App-Mento] Parallel-Regression"
      CUSTOM_URL: ${{ inputs.CUSTOM_URL }}
      NOTIFICATION_MESSAGE: "[App-Mento] Parallel-Regression"
    secrets: inherit
