name: "[Governance] Smoke Test Run"

on:
  workflow_call:
    inputs:
      CUSTOM_URL:
        description: "Custom Environment URL"
        type: string
        required: true
      IS_MAINNET:
        description: "Use Mainnet"
        type: boolean
        required: false
        default: false
      IS_FORK:
        description: "Use Fork Mode"
        type: boolean
        required: false
        default: false
      TESTOMATIO_TITLE:
        description: "Testomat Test Run Title"
        type: string
        required: false
        default: "[Governance] Smoke"
      HTML_REPORT_NAME:
        description: "HTML Report Name"
        type: string
        required: false
        default: "smoke-governance"
    secrets:
      E2E_TEST_SEED_PHRASE:
        required: true
      E2E_TEST_WALLET_PASSWORD:
        required: true
      TESTOMAT_API_KEY:
        required: true
      DISCORD_TEST_RUN_WEBHOOK_ID:
        required: true
      DISCORD_TEST_RUN_WEBHOOK_TOKEN:
        required: true
      E2E_TEST_GCP_SA_KEY:
        description: "Google Cloud Service Account key JSON"
        required: true

jobs:
  test:
    # Fully qualified path so nested workflow_call resolves from this repo when invoked by another repo
    uses: mento-protocol/mento-automation-tests/.github/workflows/base-test.yml@main
    with:
      APP_NAME: governance
      ENV: qa
      SPECS_REGEX: "@smoke"
      SPECS_TYPE: web
      IS_PARALLEL_RUN: false
      CUSTOM_URL: ${{ inputs.CUSTOM_URL }}
      IS_MAINNET: ${{ inputs.IS_MAINNET }}
      IS_FORK: ${{ inputs.IS_FORK }}
      HTML_REPORT_NAME: ${{ inputs.HTML_REPORT_NAME }}
      HTML_REPORT_GENERATION: onFailure
      TESTOMAT_REPORT_GENERATION: true
      TESTOMATIO_TITLE: ${{ inputs.TESTOMATIO_TITLE }}
      NOTIFICATION_MESSAGE: "[Governance] Smoke"
      CHECKOUT_REPOSITORY: mento-protocol/mento-automation-tests
      CHECKOUT_REF: main
      JOB_TIMEOUT_MINUTES: 60
    secrets: inherit
